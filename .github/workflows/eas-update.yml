name: EAS Update

on:
  push:
    branches:
      - main # Chạy action khi có code được đẩy lên nhánh main

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Publish EAS Update
        run: eas update --auto --branch production --message "Auto update from GitHub Actions: ${{ github.event.head_commit.message }}"
